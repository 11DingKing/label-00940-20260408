syntax = "proto3";

package order;

option php_namespace = "Grpc\\Order";
option php_metadata_namespace = "GPBMetadata";

service OrderService {
    rpc CreateOrder(CreateOrderRequest) returns (OrderResponse);
    rpc GetOrderList(OrderListRequest) returns (OrderListResponse);
    rpc GetOrderDetail(OrderDetailRequest) returns (OrderResponse);
    rpc CancelOrder(CancelOrderRequest) returns (OrderResponse);
    rpc PayOrder(PayOrderRequest) returns (OrderResponse);
    rpc UpdateOrderStatus(UpdateOrderStatusRequest) returns (OrderResponse);
}

message CreateOrderRequest {
    int64 user_id = 1;
    repeated OrderItemRequest items = 2;
    string address = 3;
    string receiver = 4;
    string phone = 5;
    string remark = 6;
}

message OrderItemRequest {
    int64 product_id = 1;
    int32 quantity = 2;
}

message OrderListRequest {
    int64 user_id = 1;
    int32 status = 2;
    int32 page = 3;
    int32 page_size = 4;
}

message OrderListResponse {
    int32 code = 1;
    string message = 2;
    repeated OrderInfo list = 3;
    int64 total = 4;
}

message OrderDetailRequest {
    int64 order_id = 1;
    string order_no = 2;
}

message OrderResponse {
    int32 code = 1;
    string message = 2;
    OrderInfo order = 3;
}

message CancelOrderRequest {
    int64 order_id = 1;
    int64 user_id = 2;
}

message PayOrderRequest {
    int64 order_id = 1;
    int64 user_id = 2;
    string payment_method = 3;
}

message UpdateOrderStatusRequest {
    int64 order_id = 1;
    int32 status = 2;
}

message OrderInfo {
    int64 id = 1;
    string order_no = 2;
    int64 user_id = 3;
    string total_amount = 4;
    int32 status = 5;
    string status_text = 6;
    string address = 7;
    string receiver = 8;
    string phone = 9;
    string remark = 10;
    string paid_at = 11;
    string created_at = 12;
    repeated OrderItemInfo items = 13;
}

message OrderItemInfo {
    int64 id = 1;
    int64 product_id = 2;
    string product_name = 3;
    string product_image = 4;
    int32 quantity = 5;
    string price = 6;
}
